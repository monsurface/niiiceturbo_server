user www www;
worker_processes {{WORKER_PROCESSES}};
pid /usr/local/nginx/logs/nginx.pid;
error_log /home/wwwlogs/error_nginx.log crit;

worker_rlimit_nofile 65535;

events {
    use epoll;
    worker_connections {{WORKER_CONNECTIONS}};
    multi_accept on;
}

http {
    include       mime.types;
    default_type  application/octet-stream;

    server_names_hash_bucket_size 128;
    client_header_buffer_size 32k;
    large_client_header_buffers 4 32k;
    client_max_body_size 50m;

    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 60;
    server_tokens off;

    # File cache
    open_file_cache max={{OPEN_FILE_CACHE_MAX}} inactive=20s;
    open_file_cache_valid 30s;
    open_file_cache_min_uses 5;
    open_file_cache_errors off;

    # Gzip
    gzip on;
    gzip_min_length 1k;
    gzip_buffers 4 16k;
    gzip_http_version 1.1;
    gzip_comp_level 4;
    gzip_types text/plain text/css text/javascript application/json application/javascript application/xml;
    gzip_vary on;
    gzip_proxied any;

    # Logging
    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for"';
    access_log /home/wwwlogs/access_nginx.log main;

    # Security headers
    include security_headers.conf;

    # Default catch-all: reject requests to IP or unknown domains
    include default_catch_all.conf;

    # Virtual hosts
    include vhost/*.conf;
}
