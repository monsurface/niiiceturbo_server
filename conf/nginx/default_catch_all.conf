# Default catch-all server — reject HTTPS requests to IP or unknown domains
# Prevents SSL certificate leakage from real vhosts
# HTTP via IP is allowed (used for phpMyAdmin, file transfer, etc.)

server {
    listen 443 ssl default_server;
    listen [::]:443 ssl default_server;
    ssl_certificate     /usr/local/nginx/conf/ssl/default.crt;
    ssl_certificate_key /usr/local/nginx/conf/ssl/default.key;
    ssl_reject_handshake on;
    return 444;
}
