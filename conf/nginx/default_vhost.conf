server {
    listen 80;
    server_name _;
    root {{DEFAULT_DIR}};
    index index.html index.htm index.php;

    access_log /home/wwwlogs/default.log main;
    error_log /home/wwwlogs/default.error.log;

    location ~ \.php$ {
        fastcgi_pass unix:/tmp/php-cgi.sock;
        fastcgi_index index.php;
        include fastcgi.conf;
    }

    location ~ /\. {
        deny all;
    }
}
