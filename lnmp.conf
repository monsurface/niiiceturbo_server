# lnmp.conf — Default configuration
#
# !! DO NOT EDIT THIS FILE !!
# This file contains default values and will be overwritten by git pull.
# To customize settings, create lnmp.conf.local in the same directory.
# Values in lnmp.conf.local override this file.
#
# Example:
#   echo "MySQL_Root_Password='my_password'" > lnmp.conf.local
#   echo "Timezone='Asia/Tokyo'" >> lnmp.conf.local

# Nginx extra modules/compile options (space-separated)
Nginx_Modules_Options=''

# PHP extra modules/compile options (space-separated)
PHP_Modules_Options=''

# Database selection: mysql | mariadb
DB_Type='mysql'

# MySQL/MariaDB data directory
MySQL_Data_Dir='/usr/local/mysql/var'
MariaDB_Data_Dir='/usr/local/mariadb/var'

# MySQL root password (used during install and by lnmp db commands)
MySQL_Root_Password='your_secure_password_here'

# Default website root
Default_Website_Dir='/home/wwwroot/default'

# Timezone (used for PHP/MySQL/system)
Timezone='Asia/Taipei'

# Compile Nginx with latest OpenSSL (HTTP/2 + TLS 1.3)
Enable_Nginx_Openssl='y'

# Nginx Lua module
Enable_Nginx_Lua='n'

# Swap (auto-create if RAM < 1G)
Enable_Swap='y'

# PHP built-in extensions toggle
Enable_PHP_Exif='n'
Enable_PHP_Fileinfo='n'
Enable_PHP_Ldap='n'
Enable_PHP_Bz2='n'
Enable_PHP_Sodium='n'
Enable_PHP_Imap='n'

# Memory allocator: none | jemalloc
Memory_Allocator='jemalloc'

# Auto mode (skip interactive prompts, use config values)
Auto_Install='n'

# Install phpMyAdmin
Enable_phpMyAdmin='y'

# Tools
Enable_Composer='y'
Enable_Docker='y'
Enable_WP_CLI='y'

# PHP extensions to install during build (space-separated)
# Available: redis imagick apcu swoole memcached sodium
PHP_Extensions_Install='redis imagick apcu'

# Security hardening
Enable_Fail2ban='n'

# Firewall: ufw | iptables | n (disabled)
Firewall='n'
