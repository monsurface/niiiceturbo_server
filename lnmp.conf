# lnmp.conf — Default configuration
#
# !! DO NOT EDIT THIS FILE !!
# This file contains default values and will be overwritten by git pull.
# To customize settings, create lnmp.conf.local in the same directory.
# Values in lnmp.conf.local override this file.
#
# Example:
#   echo "MySQL_Root_Password='my_password'" > lnmp.conf.local
#   echo "Timezone='Asia/Tokyo'" >> lnmp.conf.local
#

###############################################################################
# Database
###############################################################################

# Database engine: mysql | mariadb
DB_Type='mysql'

# Data directory for MySQL binary install
MySQL_Data_Dir='/usr/local/mysql/var'

# Data directory for MariaDB binary install
MariaDB_Data_Dir='/usr/local/mariadb/var'

# MySQL root password
# - If set: used during install and by all lnmp db/reset-password commands
# - If left as default: a random password is generated and saved to lnmp.conf.local
MySQL_Root_Password='your_secure_password_here'

###############################################################################
# Nginx
###############################################################################

# Extra Nginx compile options (space-separated)
# Example: '--add-module=/path/to/module'
Nginx_Modules_Options=''

# Compile Nginx with latest OpenSSL (enables HTTP/2, HTTP/3, TLS 1.3)
Enable_Nginx_Openssl='y'

# Compile Nginx with Lua module (for WAF, custom logic)
Enable_Nginx_Lua='n'

# Memory allocator linked into Nginx: jemalloc | none
# jemalloc reduces memory fragmentation under high concurrency
Memory_Allocator='jemalloc'

###############################################################################
# PHP
###############################################################################

# Extra PHP compile options (space-separated)
# Example: '--with-pgsql'
PHP_Modules_Options=''

# PHP built-in extensions (compiled into PHP binary)
# These require recompilation to change after install
Enable_PHP_Exif='n'         # Image EXIF metadata reading
Enable_PHP_Fileinfo='n'     # File MIME type detection
Enable_PHP_Ldap='n'         # LDAP directory access
Enable_PHP_Bz2='n'          # Bzip2 compression
Enable_PHP_Sodium='n'       # Modern cryptography (libsodium)
Enable_PHP_Imap='n'         # IMAP email protocol

# PECL extensions to compile after PHP install (space-separated)
# These can be added/removed later via: lnmp addons install <name>
# Available: redis imagick apcu swoole memcached sodium
PHP_Extensions_Install='redis imagick apcu'

###############################################################################
# Tools
###############################################################################

# Install Composer (PHP dependency manager, from getcomposer.org)
Enable_Composer='y'

# Install Docker + Docker Compose (from get.docker.com)
Enable_Docker='n'

# Install WP-CLI (WordPress command-line tool, from wp-cli.org)
Enable_WP_CLI='y'

# Install phpMyAdmin in default website directory
Enable_phpMyAdmin='y'

###############################################################################
# System
###############################################################################

# Timezone applied to: system (/etc/timezone), PHP (date.timezone), MySQL (default-time-zone)
Timezone='Asia/Taipei'

# Default website root directory
Default_Website_Dir='/home/wwwroot/default'

# Auto-create swap file when RAM < 2GB
Enable_Swap='y'

# Skip all interactive prompts, use config values only
# Automatically set when using: ./install.sh --auto lnmp
Auto_Install='n'

###############################################################################
# Security
###############################################################################

# Install and configure fail2ban (SSH + Nginx brute-force protection)
Enable_Fail2ban='n'

# Firewall configuration
# ufw      — Ubuntu's Uncomplicated Firewall (opens SSH + 80 + 443)
# iptables — Direct iptables rules with iptables-persistent (opens SSH + 80 + 443)
# n        — Disabled (manage firewall manually)
Firewall='iptables'
